<!DOCTYPE html>
<html>
<head>

<title>Freedal Bank Net Banking</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background-image:url("login-bg.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
}

/* TEXT IN CENTER */

.text{
position:absolute;
top:50%;
left:40%;
transform:translate(-50%,-50%);
font-size:42px;
color:#2b5c9e;
font-weight:300;
}

/* LOGIN BOX TOP RIGHT */

.login-box{
position:absolute;
top:40px;
right:40px;
width:300px;
background:#f5f5f5;
padding:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
border-radius:4px;
}

/* INPUTS */

.login-box input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
font-size:14px;
}

/* BUTTON */

.login-box button{
width:100%;
padding:10px;
margin-top:15px;
background:#0c4da2;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

/* LINKS */

.links{
text-align:center;
font-size:12px;
margin-top:10px;
}

.links a{
color:#0c4da2;
text-decoration:none;
margin:5px;
}

/* SIGNUP */

.signup{
text-align:right;
font-size:13px;
margin-bottom:10px;
}

/* FOOTER */

.footer{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
font-size:12px;
color:#333;
}

</style>

<script>

function login(){

var user=document.getElementById("user").value;
var pass=document.getElementById("pass").value;

if(user=="SS831" && pass=="Dhanusy@0309")
{
window.location="dashboard.html";
}
else
{
alert("Invalid User ID or Password");
}

}

</script>

</head>

<body>

<div class="text">

<br>

<b></b>

</div>


<div class="login-box">

<div class="signup">

Need an Account? <a href="#">Sign Up</a>

</div>

<input id="user" placeholder="User ID">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Log In</button>

<div class="links">

<a href="#">Forgot Password?</a>

<a href="#">Forgot User ID?</a>

<br>

<a href="#">Unlock User ID?</a>

</div>

</div>

<div class="footer">

Copyright © Freedal Bank Limited 2026

</div>

</body>
</html>
